name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token for Pages deploys.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deploy; let an in-flight run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Type-check + lint before building — either failing blocks the deploy.
      - run: pnpm run check
      - run: pnpm run lint
      - run: pnpm run build
      # Lighthouse CI: a11y / best-practices / SEO gated at >=95; performance is
      # warn-only until the image-optimization batch (then flip it to >=95 error).
      - run: pnpm run lighthouse
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
