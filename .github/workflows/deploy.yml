name: Site — CI + Pages deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege default: every job is read-only. The Pages-deploy write scopes
# live solely on the deploy job (push-only), so PR gate runs never get them.
permissions:
  contents: read

# One Pages deploy per ref at a time; PR builds get their own group so they never
# block a main deploy. Let an in-flight main deploy finish.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Type-check + lint + Lighthouse gate every PR and every push to main; any
      # failure blocks the merge (on PRs) and the deploy (on push).
      - run: pnpm run check
      - run: pnpm run lint
      - run: pnpm run build
      # Lighthouse CI: a11y / best-practices / SEO >= 0.95, performance >= 0.80.
      - run: pnpm run lighthouse
      # Hand the built site to the deploy job (push only). A plain artifact needs no
      # Pages token scopes, so the build job stays read-only.
      - uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: site-dist
          path: ./dist
          retention-days: 1

  deploy:
    needs: build
    # Deploy only on a real push to main — PRs run the gates above but never publish.
    if: github.event_name != 'pull_request'
    # Pages write scopes scoped to this job alone (configure-pages / upload-pages-artifact
    # / deploy-pages all live here, so they have the scopes they need).
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: ./dist
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
      - id: deployment
        uses: actions/deploy-pages@v5
