name: Site — CI + Pages deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege default: every job (notably the PR-only gate run) gets read-only.
# The elevated Pages-deploy scopes live on the deploy job, which runs on push only.
permissions:
  contents: read

# One Pages deploy per ref at a time; PR builds get their own group so they never
# block a main deploy. Let an in-flight main deploy finish.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Type-check + lint + Lighthouse gate every PR and every push to main; any
      # failure blocks the merge (on PRs) and the deploy (on push).
      - run: pnpm run check
      - run: pnpm run lint
      - run: pnpm run build
      # Lighthouse CI: a11y / best-practices / SEO >= 0.95, performance >= 0.80.
      - run: pnpm run lighthouse
      # The Pages artifact is only needed for the real deploy (push to main), not on PRs.
      - uses: actions/configure-pages@v6
        if: github.event_name != 'pull_request'
      - uses: actions/upload-pages-artifact@v5
        if: github.event_name != 'pull_request'
        with:
          path: ./dist

  deploy:
    needs: build
    # Deploy only on a real push to main — PRs run the gates above but never publish.
    if: github.event_name != 'pull_request'
    # Elevated Pages scopes scoped to this job alone (PR runs never see them).
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
