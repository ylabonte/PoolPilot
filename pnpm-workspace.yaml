# pnpm 10+ blocks dependency build scripts by default. Astro's image pipeline
# needs sharp's native binary, and esbuild needs its platform binary — allow
# both. (pnpm 11 replaced the old "onlyBuiltDependencies" list with this map.)
allowBuilds:
  esbuild: true
  sharp: true

# Force patched versions of vulnerable transitive deps (Dependabot alerts).
# Keys are range-scoped so only the vulnerable versions are bumped:
#   esbuild — dev-server arbitrary file read on Windows  (GHSA-g7r4-m6w7-qqqr)
#   tmp     — path traversal / symlink temp-write        (GHSA-ph9p-34f9-6g65, GHSA-52f5-9888-hmc6)
#   uuid    — missing buffer bounds check in v3/v5/v6     (GHSA-w5hq-g745-h8pq)
# tmp + uuid only reach the tree via @lhci/cli (dev/lighthouse); esbuild via astro/vite.
# Drop an entry once the upstream dep ships a patched range of its own.
overrides:
  'esbuild@>=0.27.3 <0.28.1': '^0.28.1'
  'tmp@<0.2.6': '^0.2.6'
  'uuid@<11.1.1': '^11.1.1'
